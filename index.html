<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi IA Casera</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #090c10;
    --bg2: #0d1117;
    --bg3: #161b22;
    --border: #21262d;
    --accent: #00ff88;
    --accent2: #00bfff;
    --accent3: #ff6b6b;
    --text: #c9d1d9;
    --text-dim: #6e7681;
    --text-bright: #f0f6fc;
    --user-bubble: #1a2332;
    --ai-bubble: #0d1a12;
    --glow: 0 0 20px rgba(0,255,136,0.15);
    --glow-strong: 0 0 40px rgba(0,255,136,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,136,0.015) 2px, rgba(0,255,136,0.015) 4px);
    pointer-events: none;
    z-index: 1000;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .topbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 20px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 10; flex-shrink: 0; }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .ai-avatar { width: 36px; height: 36px; border-radius: 50%; background: conic-gradient(var(--accent), var(--accent2), var(--accent)); display: flex; align-items: center; justify-content: center; font-size: 16px; animation: rotate 8s linear infinite; box-shadow: var(--glow); flex-shrink: 0; }
  @keyframes rotate { from { filter: hue-rotate(0deg); } to { filter: hue-rotate(360deg); } }
  .ai-name-display { font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 700; color: var(--accent); letter-spacing: 2px; text-shadow: var(--glow); }
  .status-badge { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--text-dim); letter-spacing: 1px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 2s ease infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .btn-icon { background: var(--bg3); border: 1px solid var(--border); color: var(--text-dim); width: 32px; height: 32px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.2s; }
  .btn-icon:hover { border-color: var(--accent); color: var(--accent); box-shadow: var(--glow); }

  .main { display: flex; flex: 1; overflow: hidden; position: relative; z-index: 1; }
  .sidebar { width: 260px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; transition: width 0.3s ease; flex-shrink: 0; }
  .sidebar.collapsed { width: 0; }
  .sidebar-inner { width: 260px; display: flex; flex-direction: column; height: 100%; overflow-y: auto; }
  .sidebar-section { padding: 16px; border-bottom: 1px solid var(--border); }
  .sidebar-label { font-size: 9px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 10px; }
  .config-field { margin-bottom: 12px; }
  .config-field label { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; display: block; margin-bottom: 5px; }
  .config-field input, .config-field textarea, .config-field select { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 7px 10px; border-radius: 6px; outline: none; transition: border-color 0.2s; }
  .apply-btn { width: 100%; background: transparent; border: 1px solid var(--accent); color: var(--accent); font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 8px; border-radius: 6px; cursor: pointer; transition: all 0.2s; margin-top: 4px; }
  .apply-btn:hover { background: var(--accent); color: var(--bg); box-shadow: var(--glow); }
  .api-status { font-size: 10px; padding: 6px 10px; border-radius: 5px; margin-top: 8px; border: 1px solid var(--border); background: var(--bg3); }
  .api-status.ok { color: var(--accent); border-color: var(--accent); }
  .api-status.warn { color: #ffa500; border-color: #ffa500; }

  .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .messages { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; }
  .welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; opacity: 0.7; padding: 40px; }
  .welcome h2 { font-family: 'Orbitron', sans-serif; font-size: 18px; color: var(--accent); }
  .quick-prompts { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
  .quick-prompt { background: var(--bg3); border: 1px solid var(--border); color: var(--text-dim); font-size: 10px; padding: 6px 12px; border-radius: 20px; cursor: pointer; }
  .message { display: flex; gap: 12px; max-width: 820px; width: 100%; align-self: flex-start; }
  .message.user { align-self: flex-end; flex-direction: row-reverse; }
  .bubble { padding: 12px 16px; border-radius: 10px; font-size: 12.5px; line-height: 1.7; white-space: pre-wrap; }
  .message.ai .bubble { background: var(--ai-bubble); border: 1px solid rgba(0,255,136,0.2); }
  .message.user .bubble { background: var(--user-bubble); border: 1px solid rgba(0,191,255,0.2); }
  .input-bar { padding: 16px 20px; background: var(--bg2); border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; }
  .input-wrap { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 2px 12px; }
  #userInput { width: 100%; background: transparent; border: none; color: var(--text-bright); font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 10px 0; outline: none; resize: none; }
  .send-btn { width: 38px; height: 38px; background: var(--accent); border: none; border-radius: 8px; cursor: pointer; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); z-index: 100; display: flex; align-items: center; justify-content: center; }
  .modal { background: var(--bg2); border: 1px solid var(--accent); border-radius: 12px; padding: 28px; width: 420px; box-shadow: var(--glow-strong); }
  .modal h3 { font-family: 'Orbitron', sans-serif; font-size: 13px; color: var(--accent); margin-bottom: 16px; }
  .modal input { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 8px; outline: none; margin-bottom: 12px; }
</style>
</head>
<body>

<div class="modal-overlay" id="apiModal">
  <div class="modal">
    <h3>🔑 CLAVE DE GROQ REQUERIDA</h3>
    <p style="font-size: 11px; color: #6e7681; margin-bottom: 15px;">Para que tu IA funcione necesitas una API Key de GROQ. Es gratuita.</p>
    <input type="password" id="apiKeyInput" placeholder="gsk_..." autocomplete="off">
    <div class="modal-actions" style="display: flex; gap: 10px;">
      <button class="apply-btn" style="background: #21262d; border-color: #21262d; color: white;" onclick="skipApiKey()">Usar demo</button>
      <button class="apply-btn" onclick="saveApiKey()">Guardar y continuar →</button>
    </div>
  </div>
</div>

<div class="topbar">
  <div class="topbar-left">
    <div class="ai-avatar" id="aiAvatar">🤖</div>
    <div>
      <div class="ai-name-display" id="aiNameDisplay">MI-IA</div>
      <div class="status-badge"><div class="status-dot"></div> <span id="statusText">ONLINE · LISTO</span></div>
    </div>
  </div>
  <div class="topbar-right">
    <button class="btn-icon" onclick="toggleSidebar()">⚙️</button>
    <button class="btn-icon" onclick="showApiModal()">🔑</button>
  </div>
</div>

<div class="main">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-inner">
      <div class="sidebar-section">
        <div class="sidebar-label">🤖 Identidad</div>
        <div class="config-field"><label>NOMBRE</label><input type="text" id="cfgName" value="ARIA"></div>
        <button class="apply-btn" onclick="applyConfig()">⚡ APLICAR CAMBIOS</button>
        <div id="apiStatusBadge" class="api-status warn">⚠ Sin API Key</div>
      </div>
    </div>
  </div>

  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="welcome" id="welcomeScreen">
        <div class="welcome-icon">🤖</div>
        <h2>Hola, soy ARIA</h2>
        <div class="quick-prompts">
          <div class="quick-prompt" onclick="quickSend('Aprende esto: Mi servidor está en el puerto 8080')">🧠 Enseñar algo</div>
        </div>
      </div>
    </div>
    <div class="input-bar">
      <div class="input-wrap"><textarea id="userInput" placeholder="Pregunta algo..." rows="1" onkeydown="handleKey(event)"></textarea></div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<script>
const PINECONE_API_KEY = 'pcsk_5WZWEp_M8UGNhSVDpUk9HAv13JA4fCLDqZYP1W5JdDxpNu6desULi6SVDURrYHA8Ky3NZF';
const PINECONE_HOST = 'https://ia-memoria-r72pvtk.svc.aped-4627-b74a.pinecone.io';

let apiKey = localStorage.getItem('mia_apikey') || ''; 
let isDemoMode = !apiKey;
let conversationHistory = [];
let config = JSON.parse(localStorage.getItem('mia_config') || '{"name":"ARIA","emoji":"🤖","color":"#00ff88","color2":"#00bfff"}');

function generateEmbedding(text) {
    let vector = new Array(1024).fill(0);
    for (let i = 0; i < text.length; i++) { vector[i % 1024] = text.charCodeAt(i) / 255; }
    return vector;
}

async function guardarEnPinecone(texto) {
    const vector = generateEmbedding(texto);
    try {
        await fetch(`${PINECONE_HOST}/vectors/upsert`, {
            method: 'POST',
            headers: { 'Api-Key': PINECONE_API_KEY, 'Content-Type': 'application/json' },
            body: JSON.stringify({ vectors: [{ id: "id-" + Date.now(), values: vector, metadata: { text: texto } }] })
        });
        showToast("🧠 Guardado en memoria");
    } catch (e) { console.error(e); }
}

async function buscarEnMemoria(pregunta) {
    const vector = generateEmbedding(pregunta);
    try {
        const res = await fetch(`${PINECONE_HOST}/query`, {
            method: 'POST',
            headers: { 'Api-Key': PINECONE_API_KEY, 'Content-Type': 'application/json' },
            body: JSON.stringify({ vector: vector, topK: 3, includeMetadata: true })
        });
        const data = await res.json();
        return data.matches ? data.matches.map(m => m.metadata.text).join("\n") : "";
    } catch (e) { return ""; }
}

function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key.startsWith('gsk_')) {
    alert('⚠️ La clave de Groq debe empezar por gsk_');
    return;
  }
  localStorage.setItem('mia_apikey', key);
  location.reload();
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  hideWelcome();
  addMessage('user', text);

  if (text.toLowerCase().startsWith("aprende esto:")) {
      await guardarEnPinecone(text.replace(/aprende esto:/i, ""));
      addMessage('ai', "🧠 Lo he memorizado.");
      return;
  }

  const memoria = await buscarEnMemoria(text);
  try {
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [{ role: 'system', content: `Eres ${config.name}. Memoria: ${memoria}` }, ...conversationHistory, { role: 'user', content: text }]
      })
    });
    const data = await response.json();
    const reply = data.choices[0].message.content;
    addMessage('ai', reply);
    conversationHistory.push({role:'user', content:text}, {role:'assistant', content:reply});
  } catch (e) { addMessage('ai', "❌ Error de conexión."); }
}

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `<div class="bubble">${text}</div>`;
  document.getElementById('messages').appendChild(div);
}
function hideWelcome() { document.getElementById('welcomeScreen')?.remove(); }
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
function showApiModal() { document.getElementById('apiModal').style.display = 'flex'; }
function skipApiKey() { document.getElementById('apiModal').style.display = 'none'; }
function handleKey(e) { if (e.key === 'Enter') sendMessage(); }
function showToast(m) { alert(m); }
if (apiKey) document.getElementById('apiModal').style.display = 'none';
</script>
</body>
</html>
